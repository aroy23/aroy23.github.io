<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Arnav Roy</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="styles/main.css">

<body>

    <aside class="spotify-widget" aria-live="polite">
        <a
            id="spotify-card"
            class="spotify-card spotify-card--idle"
            href="https://open.spotify.com/"
            target="_blank"
            rel="noreferrer"
        >
            <img
                id="spotify-cover"
                class="spotify-cover"
                alt=""
                hidden

                <div class="spotify-status-row">
                    <span class="spotify-indicator" aria-hidden="true"></span>
                    <span id="spotify-status">Checking Spotify</span>
                </div>
                <p id="spotify-track" class="spotify-track">Loading current track...</p>
                <p id="spotify-artist" class="spotify-artist">This updates automatically.</p>
            </div>

    </aside>

        <div class="title">

        <div class="social-links">
